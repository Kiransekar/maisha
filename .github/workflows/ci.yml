name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # external analyzers are optional; the native analyzer always runs
      - run: sudo apt-get update && sudo apt-get install -y cppcheck clang-tidy
      - run: pytest -q
