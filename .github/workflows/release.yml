name: Release to PyPI

# Publishes maishac to PyPI when a version tag is pushed (e.g. v0.2.1).
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret to manage.
# ONE-TIME SETUP: on pypi.org, add a trusted publisher for project `maishac`
#   owner: WinterLabsHQ · repo: maisha · workflow: release.yml · environment: pypi
# See https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for Trusted Publishing
      contents: read         # setting permissions replaces defaults, so checkout needs this back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
