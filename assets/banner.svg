<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Maisha — MISRA, BARR-C and CERT C compliance harness">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1424"/>
      <stop offset="1" stop-color="#131c30"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4a7"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>

  <!-- faint circuit grid: the "embedded" half -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200"/>
    <path d="M120 0 V300 M240 0 V300 M360 0 V300 M840 0 V300 M960 0 V300 M1080 0 V300"/>
  </g>

  <!-- heartbeat / scope trace: the "life" half. Flatline, a compliance pulse, flatline. -->
  <path d="M60 175 H430 l24 -95 l30 150 l26 -128 l22 73 H700 l20 -40 l18 40 H1140"
        fill="none" stroke="url(#pulse)" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- wordmark -->
  <text x="60" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="104" font-weight="800" fill="#f8fafc" letter-spacing="-3">Maisha</text>
  <text x="66" y="205" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="27" font-weight="500" fill="#94a3b8" letter-spacing="0.5">MISRA C:2012 · BARR-C:2018 · CERT C</text>
  <text x="66" y="240" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="20" font-weight="400" fill="#64748b" letter-spacing="0.5">the deterministic half of an agentic compliance workflow</text>

  <!-- Swahili gloss, right-aligned -->
  <text x="1140" y="66" text-anchor="end" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="19" font-weight="600" fill="#2dd4a7" letter-spacing="2">SWAHILI: “LIFE”</text>
</svg>
